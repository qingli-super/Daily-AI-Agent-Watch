name: Daily AI Agent Watch

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set date environment variable
        run: echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV

      - name: Create daily-data directory
        run: mkdir -p daily-data

      # 抓取 GitHub star 总数最高的前10个项目
      - name: Fetch GitHub top stars Agent projects
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 直接拼接完整的查询字符串，不再使用 sed 替换空格。
          # curl 的 --data-urlencode 会自动且正确地将空格转换为 %20，将引号转换为 %22。
          QUERY='"AI agent" OR agentic OR "claude code" OR "open claw" OR "autonomous agent" OR "multi-agent" OR "AI assistant" OR "LLM agent" stars:>100'
          
          curl --fail -L -sS -G \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            --data-urlencode "q=$QUERY" \
            --data-urlencode "sort=stars" \
            --data-urlencode "order=desc" \
            --data-urlencode "per_page=10" \
            "https://api.github.com/search/repositories" \
            -o "daily-data/github-stars-top10-${{ env.DATE }}.json"
            
          if [ ! -s "daily-data/github-stars-top10-${{ env.DATE }}.json" ]; then
            echo "Error: GitHub stars data file is empty"
            exit 1
          fi

      # 抓取 GitHub 最近更新的前10个项目
      - name: Fetch GitHub recently updated Agent projects
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          QUERY='"AI agent" OR agentic OR "claude code" OR "open claw" OR "autonomous agent" OR "multi-agent" OR "AI assistant" OR "LLM agent" stars:>100'
          
          curl --fail -L -sS -G \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            --data-urlencode "q=$QUERY" \
            --data-urlencode "sort=updated" \
            --data-urlencode "order=desc" \
            --data-urlencode "per_page=10" \
            "https://api.github.com/search/repositories" \
            -o "daily-data/github-updated-top10-${{ env.DATE }}.json"
            
          if [ ! -s "daily-data/github-updated-top10-${{ env.DATE }}.json" ]; then
            echo "Error: GitHub updated data file is empty"
            exit 1
          fi

      # 抓取 HuggingFace 按点赞数排序的前10个模型
      - name: Fetch HuggingFace trending Agent models
        run: |
          curl --fail -L -sS -A "Mozilla/5.0 (compatible; OpenClawBot)" \
            "https://huggingface.co/api/models?search=agent&sort=likes&direction=-1&limit=10" \
            -o "daily-data/huggingface-likes-top10-${{ env.DATE }}.json"
            
          if [ ! -s "daily-data/huggingface-likes-top10-${{ env.DATE }}.json" ]; then
            echo "Error: HuggingFace data file is empty"
            exit 1
          fi

      # 提交并推送数据
      - name: Commit and push data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add daily-data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily update ${{ env.DATE }}"
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
            git push
          fi
