name: 📈 Daily AI Agent & Quant Report (稳定版 + 数据验证)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-clean-and-summarize:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🕒 Set date environment variable
        run: echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV

      - name: 📁 Create daily-data directory
        run: mkdir -p daily-data

      # ---------- 数据抓取（完美保留你的显式 URL 编码和校验）----------
      - name: 🕷️ Fetch GitHub top stars Agent projects
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          QUERY='"AI agent" OR "autonomous agent" OR "multi-agent" stars:>100'
          ENCODED_QUERY=$(jq -rn --arg q "$QUERY" '$q|@uri')
          echo "Encoded query: $ENCODED_QUERY"
          curl --fail -L -sS -H "Authorization: Bearer $GITHUB_TOKEN" \
               "https://api.github.com/search/repositories?q=$ENCODED_QUERY&sort=stars&order=desc&per_page=10" \
               -o "daily-data/github-stars-top10-${{ env.DATE }}.json"
          if ! jq empty "daily-data/github-stars-top10-${{ env.DATE }}.json" 2>/dev/null; then
            echo "❌ GitHub stars API returned invalid JSON"
            exit 1
          fi
          if [ ! -s "daily-data/github-stars-top10-${{ env.DATE }}.json" ]; then
            echo "❌ GitHub stars data file is empty"
            exit 1
          fi

      - name: 🕷️ Fetch GitHub recently updated Agent projects
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          QUERY='"AI agent" OR "autonomous agent" OR "multi-agent" stars:>100'
          ENCODED_QUERY=$(jq -rn --arg q "$QUERY" '$q|@uri')
          echo "Encoded query: $ENCODED_QUERY"
          curl --fail -L -sS -H "Authorization: Bearer $GITHUB_TOKEN" \
               "https://api.github.com/search/repositories?q=$ENCODED_QUERY&sort=updated&order=desc&per_page=10" \
               -o "daily-data/github-updated-top10-${{ env.DATE }}.json"
          if ! jq empty "daily-data/github-updated-top10-${{ env.DATE }}.json" 2>/dev/null; then
            echo "❌ GitHub updated API returned invalid JSON"
            exit 1
          fi
          if [ ! -s "daily-data/github-updated-top10-${{ env.DATE }}.json" ]; then
            echo "❌ GitHub updated data file is empty"
            exit 1
          fi

      - name: 🕷️ Fetch HuggingFace trending Agent models
        run: |
          curl --fail -L -sS -A "Mozilla/5.0 (compatible; QuantBot/1.0)" \
            "https://huggingface.co/api/models?search=agent&sort=likes&direction=-1&limit=10" \
            -o "daily-data/huggingface-likes-top10-${{ env.DATE }}.json"
          if ! jq empty "daily-data/huggingface-likes-top10-${{ env.DATE }}.json" 2>/dev/null; then
            echo "❌ HuggingFace API returned invalid JSON"
            exit 1
          fi
          if [ ! -s "daily-data/huggingface-likes-top10-${{ env.DATE }}.json" ]; then
            echo "❌ HuggingFace data file is empty"
            exit 1
          fi

      # ---------- 数据清洗 ----------
      - name: 🗜️ Clean and compress JSON data
        run: |
          jq -r '.items[] | {name: .name, full_name: .full_name, stars: .stargazers_count, desc: .description, url: .html_url}' daily-data/github-stars-top10-${{ env.DATE }}.json > daily-data/stars-clean.json
          jq -r '.items[] | {name: .name, full_name: .full_name, updated: .updated_at, desc: .description, url: .html_url}' daily-data/github-updated-top10-${{ env.DATE }}.json > daily-data/updated-clean.json
          jq -r '.[] | {id: .id, likes: .likes}' daily-data/huggingface-likes-top10-${{ env.DATE }}.json > daily-data/hf-clean.json

          if [ ! -s daily-data/stars-clean.json ] || [ ! -s daily-data/updated-clean.json ] || [ ! -s daily-data/hf-clean.json ]; then
            echo "❌ Cleaned data file is empty"
            exit 1
          fi

      # ---------- 生成报告（本地NLP语义理解 + 回退机制）----------
      - name: 🐍 Install Python NLP dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "sentence-transformers==3.0.1"

      - name: 🧠 Generate concise report via local NLP
        run: |
          python .github/scripts/generate_report.py \
            --date "${{ env.DATE }}" \
            --stars "daily-data/stars-clean.json" \
            --updated "daily-data/updated-clean.json" \
            --hf "daily-data/hf-clean.json" \
            --output "ai_agent_daily-report-${{ env.DATE }}.md"

      # ---------- 提交报告（修复 Detached HEAD 推送报错）----------
      - name: 🚀 Commit and push report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add ai_agent_daily-report-${{ env.DATE }}.md daily-data/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📝 Daily AI Agent Report ${{ env.DATE }} (精简版)"
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
            git pull --rebase origin main
            
            # 【修复】明确指定推送到远程的 main 分支
            git push origin HEAD:main
          fi
