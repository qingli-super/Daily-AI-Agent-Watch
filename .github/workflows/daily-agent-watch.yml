name: Daily AI Agent Watch

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Create daily-data directory
        run: mkdir -p daily-data

      # 抓取 GitHub star 总数最高的前10个项目
      - name: Fetch GitHub top stars Agent projects
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KEYWORDS='"AI agent" OR agentic OR "claude code" OR "open claw" OR "autonomous agent" OR "multi-agent" OR "AI assistant" OR "LLM agent"'
          curl --fail -G -H "Authorization: token $GITHUB_TOKEN" \
            --data-urlencode "q=$KEYWORDS stars:>100" \
            --data-urlencode "sort=stars" \
            --data-urlencode "order=desc" \
            --data-urlencode "per_page=10" \
            "https://api.github.com/search/repositories" \
            > daily-data/github-stars-top10-$(date +'%Y%m%d').json

      # 抓取 GitHub 最近更新的前10个项目（作为“增长最快”的近似指标）
      - name: Fetch GitHub recently updated Agent projects
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KEYWORDS='"AI agent" OR agentic OR "claude code" OR "open claw" OR "autonomous agent" OR "multi-agent" OR "AI assistant" OR "LLM agent"'
          curl --fail -G -H "Authorization: token $GITHUB_TOKEN" \
            --data-urlencode "q=$KEYWORDS stars:>100" \
            --data-urlencode "sort=updated" \
            --data-urlencode "order=desc" \
            --data-urlencode "per_page=10" \
            "https://api.github.com/search/repositories" \
            > daily-data/github-updated-top10-$(date +'%Y%m%d').json

      # 抓取 HuggingFace 按点赞数排序的前10个模型
      - name: Fetch HuggingFace trending Agent models
        run: |
          curl --fail -A "Mozilla/5.0 (compatible; OpenClawBot)" \
            "https://huggingface.co/api/models?search=agent&sort=likes&direction=-1&limit=10" \
            > daily-data/huggingface-likes-top10-$(date +'%Y%m%d').json

      - name: Commit and push data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add daily-data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily update $(date +'%Y%m%d')"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push
